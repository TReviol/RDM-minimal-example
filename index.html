<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Isotherm & Kinetik Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: sans-serif; margin: 40px; }
#meta { margin-top:20px; font-size: 14px; }
select { margin-bottom: 20px; }
</style>
</head>

<body>

<h2>Datensatz auswählen</h2>

<select id="datasetSelect"></select>

<canvas id="chart" width="600" height="400"></canvas>

<div id="meta"></div>

<script>
let datasets = [];

async function loadNDJSON(path) {
  const res = await fetch(path);
  const text = await res.text();
  return text.trim().split("\n").map(JSON.parse);
}

async function init() {
  const iso = await loadNDJSON("Data/isotherms.ndjson");
  const kin = await loadNDJSON("Data/kinetics.ndjson");

  datasets = [...iso, ...kin];

  const select = document.getElementById("datasetSelect");

  datasets.forEach((d, i) => {
    const opt = document.createElement("option");
    opt.value = i;
    opt.text = `${d.type} - ${d.name}`;
    select.appendChild(opt);
  });

  select.addEventListener("change", () => render(select.value));

  render(0);
}

const ctx = document.getElementById('chart').getContext('2d');

let chart = new Chart(ctx, {
  type: 'line',
  data: { datasets: [] },
  options: {
    parsing: false,
    scales: {
      x: { type: 'linear', title: { display: true, text: 'x' }},
      y: { title: { display: true, text: 'y' }}
    }
  }
});

function render(index) {
  const d = datasets[index];

  chart.data.datasets = [{
    label: d.type,
    data: d.data,
    borderWidth: 2,
    pointRadius: 3
  }];

  chart.options.scales.x.title.text =
    d.type === "isotherm"
      ? "Gleichgewichtskonzentration (mg/L)"
      : "Zeit (min)";

  chart.options.scales.y.title.text =
    d.type === "isotherm"
      ? "Beladung (mg/g)"
      : "Konzentration (mg/L)";

  chart.update();

  // Metadaten anzeigen
  const metaDiv = document.getElementById("meta");
  metaDiv.innerHTML = "<h3>Metadaten</h3>" +
    Object.entries(d.meta)
      .map(([k,v]) => `<b>${k}:</b> ${v}`)
      .join("<br>");
}

init();
</script>

</body>
</html>
