<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Isotherm & Kinetik Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  margin: 24px;
  background: #f4f7fb;
  color: #1f2937;
}

h2 {
  margin-bottom: 24px;
}

h3, h4 {
  margin: 0;
}

.dashboard {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 24px;
  align-items: start;
}

.panel {
  background: #ffffff;
  border: 1px solid #d7dfeb;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
}

.panelHeader {
  margin-bottom: 16px;
}

.panelSubline {
  margin-top: 6px;
  color: #5b6472;
  font-size: 14px;
}

.filterGrid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 18px;
}

.filterField {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.filterField label {
  font-size: 13px;
  font-weight: 600;
  color: #4b5563;
}

select {
  width: 100%;
  padding: 9px 10px;
  border-radius: 10px;
  border: 1px solid #c7d2e0;
  background: #f8fafc;
  color: #111827;
}

.chartWrapper {
  height: 360px;
  margin-bottom: 18px;
}

.chartCanvas {
  width: 100% !important;
  height: 100% !important;
}

.tableSection {
  margin-top: 18px;
}

.tableSection h4 {
  margin-bottom: 10px;
}

.tableBox {
  border: 1px solid #d7dfeb;
  border-radius: 12px;
  background: #fbfdff;
  overflow: auto;
  max-height: 300px;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

th, td {
  padding: 10px 12px;
  border-bottom: 1px solid #e5ebf3;
  text-align: left;
  vertical-align: top;
}

th {
  position: sticky;
  top: 0;
  background: #eef4fb;
  font-weight: 700;
}

.emptyState {
  padding: 16px;
  color: #5b6472;
}

#status {
  margin-top: 20px;
  padding: 14px 16px;
  border-radius: 12px;
  background: #ffffff;
  border: 1px solid #d7dfeb;
}

@media (max-width: 1100px) {
  .dashboard {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<h2>Isotherm & Kinetik Viewer</h2>

<div class="dashboard">
  <section class="panel">
    <div class="panelHeader">
      <h3>Isothermen</h3>
      <div class="panelSubline" id="isothermSummary"></div>
    </div>
    <div id="isothermFilters" class="filterGrid"></div>
    <div class="chartWrapper">
      <canvas id="isothermChart" class="chartCanvas"></canvas>
    </div>
    <div class="tableSection">
      <h4>Metadaten</h4>
      <div class="tableBox" id="isothermMetaTable"></div>
    </div>
    <div class="tableSection">
      <h4>Messdaten</h4>
      <div class="tableBox" id="isothermDataTable"></div>
    </div>
  </section>

  <section class="panel">
    <div class="panelHeader">
      <h3>Kinetiken</h3>
      <div class="panelSubline" id="kineticSummary"></div>
    </div>
    <div id="kineticFilters" class="filterGrid"></div>
    <div class="chartWrapper">
      <canvas id="kineticChart" class="chartCanvas"></canvas>
    </div>
    <div class="tableSection">
      <h4>Metadaten</h4>
      <div class="tableBox" id="kineticMetaTable"></div>
    </div>
    <div class="tableSection">
      <h4>Messdaten</h4>
      <div class="tableBox" id="kineticDataTable"></div>
    </div>
  </div>

<div id="status"></div>

<script>
const viewerConfigs = {
  isotherm: {
    title: "Isothermen",
    pathCandidates: ["Data/isotherms.ndjson", "Data/isotherms.json"],
    type: "isotherm",
    chartId: "isothermChart",
    filtersId: "isothermFilters",
    summaryId: "isothermSummary",
    metaTableId: "isothermMetaTable",
    dataTableId: "isothermDataTable",
    xAxisLabel: "Gleichgewichtskonzentration (mg/L)",
    yAxisLabel: "Beladung (mg/g)",
    singleColor: "#1d4ed8"
  },
  kinetic: {
    title: "Kinetiken",
    pathCandidates: ["Data/kinetics.ndjson", "Data/kinetics.json"],
    type: "kinetic",
    chartId: "kineticChart",
    filtersId: "kineticFilters",
    summaryId: "kineticSummary",
    metaTableId: "kineticMetaTable",
    dataTableId: "kineticDataTable",
    xAxisLabel: "Zeit (min)",
    yAxisLabel: "Konzentration (mg/L)",
    singleColor: "#dc2626"
  }
};

const viewerState = {
  isotherm: { datasets: [], filterKeys: [], filters: {}, chart: null },
  kinetic: { datasets: [], filterKeys: [], filters: {}, chart: null }
};

function parseDatasetText(text) {
  const trimmed = text.trim();
  if (!trimmed) return [];

  // Support both NDJSON and regular JSON (object or array)
  try {
    const parsed = JSON.parse(trimmed);
    return Array.isArray(parsed) ? parsed : [parsed];
  } catch {
    return trimmed
      .split("\n")
      .map((line) => line.trim())
      .filter(Boolean)
      .map(JSON.parse);
  }
}

async function loadDataset(paths) {
  const pathList = Array.isArray(paths) ? paths : [paths];
  let lastError = null;

  for (const path of pathList) {
    try {
      const res = await fetch(path);
      if (!res.ok) throw new Error(`HTTP ${res.status} for ${path}`);
      const text = await res.text();
      return parseDatasetText(text);
    } catch (err) {
      lastError = err;
    }
  }

  throw lastError || new Error("Konnte Datensatz nicht laden");
}

async function init() {
  try {
    const iso = await loadDataset(viewerConfigs.isotherm.pathCandidates);
    const kin = await loadDataset(viewerConfigs.kinetic.pathCandidates);

    viewerState.isotherm.datasets = iso.filter((dataset) => dataset.type === viewerConfigs.isotherm.type);
    viewerState.kinetic.datasets = kin.filter((dataset) => dataset.type === viewerConfigs.kinetic.type);

    initViewer("isotherm");
    initViewer("kinetic");

    updateStatus();
  } catch (err) {
    document.getElementById("status").innerHTML = `<b>Fehler beim Laden der Daten:</b> ${err.message}`;
  }
}

function createChart(config) {
  const ctx = document.getElementById(config.chartId).getContext("2d");
  return new Chart(ctx, {
    type: "line",
    data: { datasets: [] },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      parsing: false,
      interaction: {
        mode: "nearest",
        intersect: false
      },
      plugins: {
        legend: {
          position: "bottom"
        }
      },
      scales: {
        x: { type: "linear", title: { display: true, text: config.xAxisLabel }},
        y: { title: { display: true, text: config.yAxisLabel }}
      }
    }
  });
}

function buildChartSeries(dataItems, singleColor) {
  return dataItems.map((d, idx) => ({
    label: d.name,
    data: d.data,
    borderWidth: 2,
    pointRadius: 3,
    tension: 0.2,
    borderColor: singleColor || `hsl(${(idx * 53) % 360} 70% 45%)`,
    backgroundColor: singleColor || `hsl(${(idx * 53) % 360} 70% 45%)`
  }));
}

function initViewer(viewerKey) {
  const state = viewerState[viewerKey];
  const config = viewerConfigs[viewerKey];

  state.filterKeys = getFilterKeys(state.datasets);
  state.filters = Object.fromEntries(["name", ...state.filterKeys].map((key) => [key, "all"]));
  state.chart = createChart(config);

  renderFilterControls(viewerKey);
  renderViewer(viewerKey);
}

function getFilterKeys(datasets) {
  return [...new Set(datasets.flatMap((dataset) => Object.keys(dataset.meta || {})))].sort((left, right) => left.localeCompare(right, "de"));
}

function renderFilterControls(viewerKey) {
  const state = viewerState[viewerKey];
  const config = viewerConfigs[viewerKey];
  const container = document.getElementById(config.filtersId);

  container.innerHTML = "";

  const allKeys = ["name", ...state.filterKeys];

  allKeys.forEach((filterKey) => {
    const wrapper = document.createElement("div");
    wrapper.className = "filterField";

    const label = document.createElement("label");
    label.textContent = filterKey === "name" ? "Datensatz" : filterKey;

    const select = document.createElement("select");
    select.dataset.viewer = viewerKey;
    select.dataset.filterKey = filterKey;

    const defaultOption = document.createElement("option");
    defaultOption.value = "all";
    defaultOption.textContent = `All ${filterKey === "name" ? "datasets" : "values"}`;
    select.appendChild(defaultOption);

    getFilterValues(state.datasets, filterKey).forEach((value) => {
      const option = document.createElement("option");
      option.value = value;
      option.textContent = value;
      select.appendChild(option);
    });

    select.value = "all";
    select.addEventListener("change", (event) => {
      state.filters[filterKey] = event.target.value;
      renderViewer(viewerKey);
      updateStatus();
    });

    wrapper.appendChild(label);
    wrapper.appendChild(select);
    container.appendChild(wrapper);
  });
}

function getFilterValues(datasets, filterKey) {
  const values = datasets.map((dataset) => getDatasetFieldValue(dataset, filterKey)).filter((value) => value !== "");
  return [...new Set(values)].sort((left, right) => left.localeCompare(right, "de"));
}

function getDatasetFieldValue(dataset, filterKey) {
  if (filterKey === "name") return dataset.name || "";
  return dataset.meta?.[filterKey] ?? "";
}

function getFilteredDatasets(viewerKey) {
  const state = viewerState[viewerKey];
  return state.datasets.filter((dataset) => Object.entries(state.filters).every(([filterKey, selectedValue]) => {
    if (selectedValue === "all") return true;
    return getDatasetFieldValue(dataset, filterKey) === selectedValue;
  }));
}

function renderViewer(viewerKey) {
  const state = viewerState[viewerKey];
  const config = viewerConfigs[viewerKey];
  const filteredDatasets = getFilteredDatasets(viewerKey);
  const isSingleDataset = filteredDatasets.length === 1;

  state.chart.data.datasets = buildChartSeries(filteredDatasets, isSingleDataset ? config.singleColor : null);
  state.chart.update();

  renderMetaTable(viewerKey, filteredDatasets);
  renderDataTable(viewerKey, filteredDatasets);
  updateSummary(viewerKey, filteredDatasets.length);
}

function updateSummary(viewerKey, visibleCount) {
  const state = viewerState[viewerKey];
  const config = viewerConfigs[viewerKey];
  const activeFilters = Object.entries(state.filters).filter(([, value]) => value !== "all").length;

  document.getElementById(config.summaryId).textContent = `${visibleCount} von ${state.datasets.length} Datensaetzen sichtbar, ${activeFilters} Filter aktiv`;
}

function renderMetaTable(viewerKey, datasets) {
  const state = viewerState[viewerKey];
  const config = viewerConfigs[viewerKey];
  const container = document.getElementById(config.metaTableId);

  if (datasets.length === 0) {
    container.innerHTML = '<div class="emptyState">Keine Datensaetze fuer die aktuelle Filterkombination gefunden.</div>';
    return;
  }

  const columns = ["name", ...state.filterKeys];
  const headerCells = columns.map((column) => `<th>${column === "name" ? "Datensatz" : column}</th>`).join("");
  const bodyRows = datasets.map((dataset) => {
    const cells = columns.map((column) => `<td>${escapeHtml(getDatasetFieldValue(dataset, column) || "-")}</td>`).join("");
    return `<tr>${cells}</tr>`;
  }).join("");

  container.innerHTML = `<table><thead><tr>${headerCells}</tr></thead><tbody>${bodyRows}</tbody></table>`;
}

function renderDataTable(viewerKey, datasets) {
  const config = viewerConfigs[viewerKey];
  const container = document.getElementById(config.dataTableId);

  const rows = datasets.flatMap((dataset) => dataset.data.map((point, index) => ({
    datasetName: dataset.name,
    pointIndex: index + 1,
    x: point.x,
    y: point.y
  })));

  if (rows.length === 0) {
    container.innerHTML = '<div class="emptyState">Keine Messpunkte fuer die aktuelle Filterkombination gefunden.</div>';
    return;
  }

  const bodyRows = rows.map((row) => (
    `<tr><td>${escapeHtml(row.datasetName)}</td><td>${row.pointIndex}</td><td>${row.x}</td><td>${row.y}</td></tr>`
  )).join("");

  container.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Datensatz</th>
          <th>Punkt</th>
          <th>x</th>
          <th>y</th>
        </tr>
      </thead>
      <tbody>${bodyRows}</tbody>
    </table>`;
}

function updateStatus() {
  const isoVisible = getFilteredDatasets("isotherm").length;
  const kinVisible = getFilteredDatasets("kinetic").length;
  document.getElementById("status").innerHTML = `<b>Status:</b> ${isoVisible} Isothermen und ${kinVisible} Kinetiken entsprechen den aktuellen Filtern.`;
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

init();
</script>

</body>
</html>
