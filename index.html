<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Isotherm & Kinetik Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  margin: 24px;
  background: #f4f7fb;
  color: #1f2937;
}

h2 {
  margin-bottom: 24px;
}

h3, h4 {
  margin: 0;
}

.dashboard {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 24px;
  align-items: start;
}

.panel {
  background: #ffffff;
  border: 1px solid #d7dfeb;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
}

.panelHeader {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 16px;
}

.panelHeaderText {
  min-width: 0;
}

.resetButton {
  border: 1px solid #b6c5da;
  background: #ffffff;
  color: #1f2937;
  border-radius: 10px;
  padding: 6px 12px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}

.resetButton:hover {
  background: #f1f5fb;
}

.panelSubline {
  margin-top: 6px;
  color: #5b6472;
  font-size: 14px;
}

.viewerOptions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 14px;
}

.optionItem {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: #374151;
}

.optionItem input[type="checkbox"] {
  accent-color: #1f4dbd;
}

.tableOptions {
  margin-bottom: 10px;
}

.separatorLeft {
  border-left: 2px solid #d7dfeb;
}

.filterGrid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 18px;
}

.filterField {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.filterField label {
  font-size: 13px;
  font-weight: 600;
  color: #4b5563;
}

select {
  width: 100%;
  padding: 9px 10px;
  border-radius: 10px;
  border: 1px solid #c7d2e0;
  background: #f8fafc;
  color: #111827;
}

.chartWrapper {
  height: 360px;
  margin-bottom: 18px;
}

.chartCanvas {
  width: 100% !important;
  height: 100% !important;
}

.tableSection {
  margin-top: 18px;
}

.tableSection h4 {
  margin-bottom: 10px;
}

.tableBox {
  border: 1px solid #d7dfeb;
  border-radius: 12px;
  background: #fbfdff;
  overflow: auto;
  max-height: 300px;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

.dataTable {
  table-layout: fixed;
  width: max-content;
  min-width: max-content;
}

.dataTableIdCol {
  width: 0.5cm;
  min-width: 0.5cm;
  max-width: 0.5cm;
}

.dataTableValueCol {
  width: 1.5cm;
  min-width: 1.5cm;
  max-width: 1.5cm;
}

th, td {
  padding: 10px 12px;
  border-bottom: 1px solid #e5ebf3;
  text-align: left;
  vertical-align: top;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

th {
  position: sticky;
  top: 0;
  background: #eef4fb;
  font-weight: 700;
}

.emptyState {
  padding: 16px;
  color: #5b6472;
}

#status {
  margin-top: 20px;
  padding: 14px 16px;
  border-radius: 12px;
  background: #ffffff;
  border: 1px solid #d7dfeb;
}

@media (max-width: 1100px) {
  .dashboard {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<h2>Isotherm & Kinetik Viewer</h2>

<div class="dashboard">
  <section class="panel">
    <div class="panelHeader">
      <div class="panelHeaderText">
        <h3>Isothermen</h3>
        <div class="panelSubline" id="isothermSummary"></div>
      </div>
      <button id="isothermResetButton" class="resetButton" type="button">Reset</button>
    </div>
    <div id="isothermOptions" class="viewerOptions"></div>
    <div id="isothermFilters" class="filterGrid"></div>
    <div class="chartWrapper">
      <canvas id="isothermChart" class="chartCanvas"></canvas>
    </div>
    <div class="tableSection">
      <h4>Metadaten</h4>
      <div class="tableBox" id="isothermMetaTable"></div>
    </div>
    <div class="tableSection">
      <h4>Messdaten</h4>
      <div id="isothermDataOptions" class="tableOptions"></div>
      <div class="tableBox" id="isothermDataTable"></div>
    </div>
  </section>

  <section class="panel">
    <div class="panelHeader">
      <div class="panelHeaderText">
        <h3>Kinetiken</h3>
        <div class="panelSubline" id="kineticSummary"></div>
      </div>
      <button id="kineticResetButton" class="resetButton" type="button">Reset</button>
    </div>
    <div id="kineticOptions" class="viewerOptions"></div>
    <div id="kineticFilters" class="filterGrid"></div>
    <div class="chartWrapper">
      <canvas id="kineticChart" class="chartCanvas"></canvas>
    </div>
    <div class="tableSection">
      <h4>Metadaten</h4>
      <div class="tableBox" id="kineticMetaTable"></div>
    </div>
    <div class="tableSection">
      <h4>Messdaten</h4>
      <div id="kineticDataOptions" class="tableOptions"></div>
      <div class="tableBox" id="kineticDataTable"></div>
    </div>
  </section>
  </div>

<div id="status"></div>

<script>
const viewerConfigs = {
  isotherm: {
    title: "Isothermen",
    prefix: "iso_",
    pathCandidates: ["Data/isotherms.ndjson", "Data/isotherms.json"],
    type: "isotherm",
    chartId: "isothermChart",
    resetButtonId: "isothermResetButton",
    optionsId: "isothermOptions",
    filtersId: "isothermFilters",
    summaryId: "isothermSummary",
    metaTableId: "isothermMetaTable",
    dataOptionsId: "isothermDataOptions",
    dataTableId: "isothermDataTable",
    xAxisLabel: "Gleichgewichtskonzentration (mg/L)",
    yAxisLabel: "Beladung (mg/g)",
    singleColor: "#1d4ed8"
  },
  kinetic: {
    title: "Kinetiken",
    prefix: "kin_",
    pathCandidates: ["Data/kinetics.ndjson", "Data/kinetics.json"],
    type: "kinetic",
    chartId: "kineticChart",
    resetButtonId: "kineticResetButton",
    optionsId: "kineticOptions",
    filtersId: "kineticFilters",
    summaryId: "kineticSummary",
    metaTableId: "kineticMetaTable",
    dataOptionsId: "kineticDataOptions",
    dataTableId: "kineticDataTable",
    xAxisLabel: "Zeit (min)",
    yAxisLabel: "Konzentration (mg/L)",
    singleColor: "#dc2626"
  }
};

const viewerState = {
  isotherm: { datasets: [], filterKeys: [], filters: {}, options: { showLegendOverride: false, showAllDataTableDatasets: false }, chart: null },
  kinetic: { datasets: [], filterKeys: [], filters: {}, options: { showLegendOverride: false, showAllDataTableDatasets: false }, chart: null }
};

const collator = new Intl.Collator("de", { numeric: true, sensitivity: "base" });

function parseDatasetText(text) {
  const trimmed = text.trim();
  if (!trimmed) return [];

  // Support both NDJSON and regular JSON (object or array)
  try {
    const parsed = JSON.parse(trimmed);
    return Array.isArray(parsed) ? parsed : [parsed];
  } catch {
    return trimmed
      .split("\n")
      .map((line) => line.trim())
      .filter(Boolean)
      .map(JSON.parse);
  }
}

async function loadDataset(paths) {
  const pathList = Array.isArray(paths) ? paths : [paths];
  let lastError = null;

  for (const path of pathList) {
    try {
      const res = await fetch(path);
      if (!res.ok) throw new Error(`HTTP ${res.status} for ${path}`);
      const text = await res.text();
      return parseDatasetText(text);
    } catch (err) {
      lastError = err;
    }
  }

  throw lastError || new Error("Konnte Datensatz nicht laden");
}

async function discoverJsonFilesByPrefix(prefix) {
  const response = await fetch("Data/");
  if (!response.ok) {
    throw new Error(`Data-Verzeichnis konnte nicht gelesen werden (HTTP ${response.status})`);
  }

  const indexHtml = await response.text();
  const hrefRegex = /href\s*=\s*["']([^"']+)["']/gi;
  const files = new Set();
  let match;

  while ((match = hrefRegex.exec(indexHtml)) !== null) {
    const href = match[1];
    const decoded = decodeURIComponent(href);
    const normalized = decoded.split("?")[0].split("#")[0];
    const fileName = normalized.split("/").pop() || "";
    if (!fileName.toLowerCase().endsWith(".json")) continue;
    if (!fileName.startsWith(prefix)) continue;
    files.add(fileName);
  }

  return [...files].sort((left, right) => collator.compare(left, right));
}

async function loadDatasetsByPrefix(config) {
  const fileNames = await discoverJsonFilesByPrefix(config.prefix);
  if (fileNames.length === 0) {
    throw new Error(`Keine Dateien mit Prefix \"${config.prefix}\" im Data-Verzeichnis gefunden`);
  }

  const datasets = [];
  for (const fileName of fileNames) {
    const parsed = await loadDataset(`Data/${fileName}`);
    datasets.push(...parsed.map((dataset, index) => ({
      ...dataset,
      type: dataset.type || config.type,
      name: dataset.name || dataset.id || `${fileName}#${index + 1}`
    })));
  }

  return datasets;
}

async function loadDatasetsForViewer(config) {
  try {
    return await loadDatasetsByPrefix(config);
  } catch {
    const fallback = await loadDataset(config.pathCandidates);
    return fallback.map((dataset, index) => ({
      ...dataset,
      type: dataset.type || config.type,
      name: dataset.name || dataset.id || `${config.type}_${index + 1}`
    }));
  }
}

async function init() {
  try {
    const [iso, kin] = await Promise.all([
      loadDatasetsForViewer(viewerConfigs.isotherm),
      loadDatasetsForViewer(viewerConfigs.kinetic)
    ]);

    viewerState.isotherm.datasets = iso;
    viewerState.kinetic.datasets = kin;

    initViewer("isotherm");
    initViewer("kinetic");

    updateStatus();
  } catch (err) {
    document.getElementById("status").innerHTML = `<b>Fehler beim Laden der Daten:</b> ${err.message}`;
  }
}

function createChart(config) {
  const ctx = document.getElementById(config.chartId).getContext("2d");
  return new Chart(ctx, {
    type: "line",
    data: { datasets: [] },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      parsing: false,
      interaction: {
        mode: "nearest",
        intersect: false
      },
      plugins: {
        legend: {
          position: "bottom"
        }
      },
      scales: {
        x: { type: "linear", title: { display: true, text: config.xAxisLabel }},
        y: { title: { display: true, text: config.yAxisLabel }}
      }
    }
  });
}

function buildChartSeries(dataItems, singleColor) {
  return dataItems.map((d, idx) => ({
    label: d.name,
    data: d.data,
    borderWidth: 2,
    pointRadius: 3,
    tension: 0.2,
    borderColor: singleColor || `hsl(${(idx * 53) % 360} 70% 45%)`,
    backgroundColor: singleColor || `hsl(${(idx * 53) % 360} 70% 45%)`
  }));
}

function initViewer(viewerKey) {
  const state = viewerState[viewerKey];
  const config = viewerConfigs[viewerKey];

  state.filterKeys = getFilterKeys(state.datasets);
  state.filters = Object.fromEntries(["name", ...state.filterKeys].map((key) => [key, "all"]));
  state.chart = createChart(config);
  bindResetButton(viewerKey);

  renderOptionControls(viewerKey);
  renderDataOptionsControls(viewerKey);
  renderFilterControls(viewerKey);
  renderViewer(viewerKey);
}

function bindResetButton(viewerKey) {
  const config = viewerConfigs[viewerKey];
  const button = document.getElementById(config.resetButtonId);
  if (!button) return;

  button.addEventListener("click", () => {
    const state = viewerState[viewerKey];
    Object.keys(state.filters).forEach((filterKey) => {
      state.filters[filterKey] = "all";
    });

    renderFilterControls(viewerKey);
    renderViewer(viewerKey);
    updateStatus();
  });
}

function renderOptionControls(viewerKey) {
  const state = viewerState[viewerKey];
  const config = viewerConfigs[viewerKey];
  const container = document.getElementById(config.optionsId);

  container.innerHTML = "";

  const legendOption = document.createElement("label");
  legendOption.className = "optionItem";

  const legendCheckbox = document.createElement("input");
  legendCheckbox.type = "checkbox";
  legendCheckbox.checked = state.options.showLegendOverride;
  legendCheckbox.addEventListener("change", (event) => {
    state.options.showLegendOverride = event.target.checked;
    renderViewer(viewerKey);
    updateStatus();
  });

  const legendText = document.createElement("span");
  legendText.textContent = "Legende manuell anzeigen";
  legendOption.appendChild(legendCheckbox);
  legendOption.appendChild(legendText);

  container.appendChild(legendOption);
}

function renderDataOptionsControls(viewerKey) {
  const state = viewerState[viewerKey];
  const config = viewerConfigs[viewerKey];
  const container = document.getElementById(config.dataOptionsId);

  container.innerHTML = "";

  const option = document.createElement("label");
  option.className = "optionItem";

  const checkbox = document.createElement("input");
  checkbox.type = "checkbox";
  checkbox.checked = state.options.showAllDataTableDatasets;
  checkbox.addEventListener("change", (event) => {
    state.options.showAllDataTableDatasets = event.target.checked;
    renderViewer(viewerKey);
    updateStatus();
  });

  const text = document.createElement("span");
  text.textContent = "Mehr als 10 Datensaetze in Messdaten anzeigen";
  option.appendChild(checkbox);
  option.appendChild(text);

  container.appendChild(option);
}

function getFilterKeys(datasets) {
  return [...new Set(datasets.flatMap((dataset) => Object.keys(dataset.meta || {})))].sort((left, right) => collator.compare(String(left), String(right)));
}

function renderFilterControls(viewerKey) {
  const state = viewerState[viewerKey];
  const config = viewerConfigs[viewerKey];
  const container = document.getElementById(config.filtersId);

  container.innerHTML = "";

  const allKeys = ["name", ...state.filterKeys];

  allKeys.forEach((filterKey) => {
    const wrapper = document.createElement("div");
    wrapper.className = "filterField";

    const label = document.createElement("label");
    label.textContent = filterKey === "name" ? "Datensatz" : filterKey;

    const select = document.createElement("select");
    select.dataset.viewer = viewerKey;
    select.dataset.filterKey = filterKey;

    const defaultOption = document.createElement("option");
    defaultOption.value = "all";
    defaultOption.textContent = `All ${filterKey === "name" ? "datasets" : "values"}`;
    select.appendChild(defaultOption);

    getFilterValues(state.datasets, filterKey).forEach((value) => {
      const option = document.createElement("option");
      option.value = value;
      option.textContent = value;
      select.appendChild(option);
    });

    select.value = "all";
    select.addEventListener("change", (event) => {
      state.filters[filterKey] = event.target.value;
      renderViewer(viewerKey);
      updateStatus();
    });

    wrapper.appendChild(label);
    wrapper.appendChild(select);
    container.appendChild(wrapper);
  });
}

function getFilterValues(datasets, filterKey) {
  const values = datasets
    .map((dataset) => normalizeFilterValue(getDatasetFieldValue(dataset, filterKey)))
    .filter((value) => value !== "");

  return [...new Set(values)].sort((left, right) => collator.compare(left, right));
}

function getDatasetFieldValue(dataset, filterKey) {
  if (filterKey === "name") return dataset.name || "";
  return dataset.meta?.[filterKey] ?? "";
}

function normalizeFilterValue(value) {
  if (value === null || value === undefined) return "";
  return typeof value === "string" ? value : String(value);
}

function getFilteredDatasets(viewerKey) {
  const state = viewerState[viewerKey];
  return state.datasets.filter((dataset) => Object.entries(state.filters).every(([filterKey, selectedValue]) => {
    if (selectedValue === "all") return true;
    return normalizeFilterValue(getDatasetFieldValue(dataset, filterKey)) === selectedValue;
  }));
}

function getDisplayedDatasets(viewerKey) {
  const filteredDatasets = getFilteredDatasets(viewerKey);
  return filteredDatasets.slice(0, 10);
}

function getDisplayedDataTableDatasets(viewerKey) {
  const state = viewerState[viewerKey];
  const filteredDatasets = getFilteredDatasets(viewerKey);
  if (state.options.showAllDataTableDatasets) return filteredDatasets;
  return filteredDatasets.slice(0, 10);
}

function renderViewer(viewerKey) {
  const state = viewerState[viewerKey];
  const config = viewerConfigs[viewerKey];
  const filteredDatasets = getFilteredDatasets(viewerKey);
  const displayedDatasets = getDisplayedDatasets(viewerKey);
  const displayedDataTableDatasets = getDisplayedDataTableDatasets(viewerKey);
  const isSingleDataset = displayedDatasets.length === 1;
  const shouldShowLegend = state.options.showLegendOverride || displayedDatasets.length < 10;

  state.chart.options.plugins.legend.display = shouldShowLegend;
  state.chart.data.datasets = buildChartSeries(displayedDatasets, isSingleDataset ? config.singleColor : null);
  state.chart.update();

  renderMetaTable(viewerKey, displayedDatasets);
  renderDataTable(viewerKey, displayedDataTableDatasets);
  updateSummary(viewerKey, displayedDatasets.length, filteredDatasets.length);
}

function updateSummary(viewerKey, visibleCount, filteredCount) {
  const state = viewerState[viewerKey];
  const config = viewerConfigs[viewerKey];
  const activeFilters = Object.entries(state.filters).filter(([, value]) => value !== "all").length;
  const limitNote = filteredCount > visibleCount ? `, Anzeige auf ${visibleCount} Datensaetze begrenzt` : "";

  document.getElementById(config.summaryId).textContent = `${visibleCount} von ${filteredCount} gefilterten Datensaetzen sichtbar (${state.datasets.length} gesamt), ${activeFilters} Filter aktiv${limitNote}`;
}

function renderMetaTable(viewerKey, datasets) {
  const state = viewerState[viewerKey];
  const config = viewerConfigs[viewerKey];
  const container = document.getElementById(config.metaTableId);

  if (datasets.length === 0) {
    container.innerHTML = '<div class="emptyState">Keine Datensaetze fuer die aktuelle Filterkombination gefunden.</div>';
    return;
  }

  const columns = ["name", ...state.filterKeys];
  const headerCells = columns.map((column) => `<th>${column === "name" ? "Datensatz" : column}</th>`).join("");
  const bodyRows = datasets.map((dataset) => {
    const cells = columns.map((column) => `<td>${escapeHtml(getDatasetFieldValue(dataset, column) || "-")}</td>`).join("");
    return `<tr>${cells}</tr>`;
  }).join("");

  container.innerHTML = `<table><thead><tr>${headerCells}</tr></thead><tbody>${bodyRows}</tbody></table>`;
}

function renderDataTable(viewerKey, datasets) {
  const config = viewerConfigs[viewerKey];
  const container = document.getElementById(config.dataTableId);

  if (datasets.length === 0) {
    container.innerHTML = '<div class="emptyState">Keine Messpunkte fuer die aktuelle Filterkombination gefunden.</div>';
    return;
  }

  const maxPoints = Math.max(...datasets.map((dataset) => Array.isArray(dataset.data) ? dataset.data.length : 0), 0);
  if (maxPoints === 0) {
    container.innerHTML = '<div class="emptyState">Keine Messpunkte fuer die aktuelle Filterkombination gefunden.</div>';
    return;
  }

  const topHeader = datasets.map((dataset) => {
    const datasetLabel = dataset.id || dataset.name || "-";
    return `<th class="separatorLeft dataTableValueCol" colspan="2">${escapeHtml(datasetLabel)}</th>`;
  }).join("");

  const subHeader = datasets.map(() => "<th class=\"separatorLeft dataTableValueCol\">x</th><th class=\"dataTableValueCol\">y</th>").join("");

  const colGroup = [
    '<col class="dataTableIdCol">',
    ...datasets.flatMap(() => ['<col class="dataTableValueCol">', '<col class="dataTableValueCol">'])
  ].join("");

  const bodyRows = Array.from({ length: maxPoints }, (_, rowIndex) => {
    const cells = datasets.map((dataset) => {
      const point = dataset.data?.[rowIndex];
      const x = point?.x ?? "";
      const y = point?.y ?? "";
      return `<td class="separatorLeft dataTableValueCol">${escapeHtml(x)}</td><td class="dataTableValueCol">${escapeHtml(y)}</td>`;
    }).join("");

    return `<tr><td class="dataTableIdCol">${rowIndex + 1}</td>${cells}</tr>`;
  }).join("");

  container.innerHTML = `
    <table class="dataTable">
      <colgroup>${colGroup}</colgroup>
      <thead>
        <tr>
          <th class="dataTableIdCol">ID</th>
          ${topHeader}
        </tr>
        <tr><th class="dataTableIdCol"></th>${subHeader}</tr>
      </thead>
      <tbody>${bodyRows}</tbody>
    </table>`;
}

function updateStatus() {
  const isoFiltered = getFilteredDatasets("isotherm").length;
  const kinFiltered = getFilteredDatasets("kinetic").length;
  const isoShown = getDisplayedDatasets("isotherm").length;
  const kinShown = getDisplayedDatasets("kinetic").length;
  const isoTableShown = getDisplayedDataTableDatasets("isotherm").length;
  const kinTableShown = getDisplayedDataTableDatasets("kinetic").length;
  document.getElementById("status").innerHTML = `<b>Status:</b> Charts/Metadaten: ${isoShown}/${isoFiltered} Isothermen und ${kinShown}/${kinFiltered} Kinetiken. Messdaten: ${isoTableShown}/${isoFiltered} Isothermen und ${kinTableShown}/${kinFiltered} Kinetiken.`;
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

init();
</script>

</body>
</html>
