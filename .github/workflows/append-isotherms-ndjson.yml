name: Rebuild isotherms.ndjson

on:
  push:

permissions:
  contents: write

concurrency:
  group: rebuild-isotherms-ndjson
  cancel-in-progress: true

jobs:
  rebuild-ndjson:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Rebuild Data/isotherms.ndjson from Data/raw-isotherms
        run: |
          set -euo pipefail

          mkdir -p Data
          : > Data/isotherms.ndjson

          shopt -s nullglob
          files=(Data/raw-isotherms/*.json)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No raw isotherm files found. Created empty Data/isotherms.ndjson"
            exit 0
          fi

          printf '%s\n' "${files[@]}" | sort | while IFS= read -r file; do
            echo "Processing $file"
            jq -e . "$file" >/dev/null
            jq -c . "$file" >> Data/isotherms.ndjson
          done

      - name: Commit and push if changed
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add -f Data/isotherms.ndjson
          if git diff --cached --quiet; then
            echo "No NDJSON changes to commit"
            exit 0
          fi

          git commit -m "Rebuild isotherms.ndjson from raw-isotherms"
          git push
