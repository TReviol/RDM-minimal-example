name: Append new isotherm JSON to NDJSON

on:
  push:
    paths:
      - 'Data/raw-isotherms/*.json'

permissions:
  contents: write

concurrency:
  group: ndjson-update
  cancel-in-progress: false

jobs:
  append-to-ndjson:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Find new JSON files
        id: files
        run: |
          files=$(git log --name-only --pretty="" -n 1 | grep '^Data/raw-isotherms/.*\.json' || true)
          echo "files=$files" >> $GITHUB_OUTPUT

      - name: Append to NDJSON
        run: |
          touch Data/isotherms.ndjson

          if [ -z "${{ steps.files.outputs.files }}" ]; then
            echo "No new files"
            exit 0
          fi

          for file in ${{ steps.files.outputs.files }}
          do
            echo "Processing $file"

            jq empty "$file" || { echo "Invalid JSON: $file"; exit 1; }

            jq -c . "$file" >> Data/isotherms.ndjson
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add Data/isotherms.ndjson

          git diff --cached --quiet || git commit -m "Append new data to isotherms.ndjson"

          git pull --rebase
          git push
