name: Append new isotherm JSON to NDJSON

on:
  push:
    paths:
      - 'Data/raw-isotherms/*.json'

permissions:
  contents: write

concurrency:
  group: ndjson-update
  cancel-in-progress: false

jobs:
  append-to-ndjson:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Find new JSON files
        id: files
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            files=$(git ls-files 'Data/raw-isotherms/*.json' || true)
          else
            files=$(git diff --name-only --diff-filter=A "$BEFORE" "$AFTER" -- 'Data/raw-isotherms/*.json' || true)
          fi

          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Append to NDJSON
        run: |
          set -euo pipefail
          touch Data/isotherms.ndjson

          if [ -z "${{ steps.files.outputs.files }}" ]; then
            echo "No new files"
            exit 0
          fi

          while IFS=read -r file; do
            [ -z "$file" ] && continue
            [ -f "$file" ] || continue
            
            echo "Processing $file"
            jq empty "$file" || { echo "Invalid JSON: $file"; exit 1; }

            id=$(jq -r '.id // empty' "$file")
            if [ -n "$id" ] && jq -e --arg id "$id" 'select(.id == $id)' Data/isotherms.ndjson >/dev/null 2>&1; then
              echo "Skipping $file (id already present: $id)"
              continue
            fi

            jq -c . "$file" >> Data/isotherms.ndjson
          done <<< "${{ steps.files.outputs.files }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git pull --rebase
          
          git add -f Data/isotherms.ndjson
          git diff --cached --quiet || git commit -m "Append new data to isotherms.ndjson"          
          git push
